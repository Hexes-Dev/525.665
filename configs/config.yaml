# Model selection (automatically selects associated dataset)
model_type: "baseline" # options: baseline, kinematic

# Data Paths
db_path: "data/dataset.db"
calibration_file: "data/calibration.json"
norm_params_path: "src/ml/norm_params.json"

# Training Hyperparameters
epochs: 10
batch_size: 32
lr: 0.001
window_duration: 10.0
train_split: 0.8
seed: 42

# Model-specific params
hidden_dim: 128
feedback_dim: 32   # Used by baseline
# latent_dim: 64    # Used by kinematic

# Optimizer & Scheduler
optimizer: "Adam"
loss_fn: "MSELoss"
scheduler: "StepLR"

optimizer_params:
  weight_decay: 1.0e-5
  # amsgrad: false

scheduler_params:
  step_size: 5
  gamma: 0.1
